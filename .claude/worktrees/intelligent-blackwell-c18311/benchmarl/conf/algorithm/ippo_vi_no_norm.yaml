defaults:
  - ippo_vi_no_norm_config
  - _self_

share_param_critic: False
clip_epsilon: 0.2
entropy_coef: 0.0
critic_coef: 1.0
loss_critic_type: "l2"
lmbda: 0.9
scale_mapping: "biased_softplus_1.0"
use_tanh_normal: True
minibatch_advantage: False

# VIOptimizer hyperparameter (anchor regularization, no gradient normalization)
vi_tau: 0.1
