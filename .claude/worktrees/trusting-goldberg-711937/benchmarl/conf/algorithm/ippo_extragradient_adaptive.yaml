defaults:
  - ippo_extragradient_adaptive_config
  - _self_

share_param_critic: False
clip_epsilon: 0.2
entropy_coef: 0.0
critic_coef: 1.0
loss_critic_type: "l2"
lmbda: 0.9
scale_mapping: "biased_softplus_1.0"
use_tanh_normal: True
minibatch_advantage: False

# VIOptimizer hyperparameter (inherited from IppoVIConfig)
vi_tau: 0.1

# ExtraAdam hyperparameters
extra_betas: [0.9, 0.999]

# Adaptive step-size hyperparameters
# nu: scales param_dist/grad_dist ratio to compute adaptive LR target
# rho: max LR increment per step
extra_nu: 0.95
extra_rho: 1.0e-4
extra_min_scale: 0.1
