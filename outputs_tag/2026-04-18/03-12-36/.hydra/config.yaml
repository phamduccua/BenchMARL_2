experiment:
  sampling_device: cuda
  train_device: cuda
  buffer_device: cuda
  share_policy_params: true
  prefer_continuous_actions: true
  collect_with_grad: false
  parallel_collection: false
  gamma: 0.99
  lr: 5.0e-05
  adam_eps: 1.0e-06
  adam_extra_kwargs: {}
  clip_grad_norm: true
  clip_grad_val: 5.0
  soft_target_update: true
  polyak_tau: 0.005
  hard_target_update_frequency: 5
  exploration_eps_init: 0.8
  exploration_eps_end: 0.01
  exploration_anneal_frames: null
  max_n_iters: null
  max_n_frames: 2000000
  on_policy_collected_frames_per_batch: 120000
  on_policy_n_envs_per_worker: 200
  on_policy_n_minibatch_iters: 15
  on_policy_minibatch_size: 4096
  off_policy_collected_frames_per_batch: 120000
  off_policy_n_envs_per_worker: 200
  off_policy_n_optimizer_steps: 200
  off_policy_train_batch_size: 4096
  off_policy_memory_size: 1000000
  off_policy_init_random_frames: 0
  off_policy_use_prioritized_replay_buffer: false
  off_policy_prb_alpha: 0.6
  off_policy_prb_beta: 0.4
  evaluation: true
  render: false
  evaluation_interval: 240000
  evaluation_episodes: 10
  evaluation_deterministic_actions: true
  evaluation_static: false
  loggers:
  - csv
  project_name: benchmarl
  wandb_extra_kwargs: {}
  create_json: true
  save_folder: null
  restore_file: null
  restore_map_location: null
  checkpoint_interval: 0
  checkpoint_at_end: false
  keep_checkpoints_num: 3
  exclude_buffer_from_checkpoint: false
algorithm:
  share_param_critic: true
  num_qvalue_nets: 2
  loss_function: l2
  delay_qvalue: true
  target_entropy: auto
  discrete_target_entropy_weight: 0.2
  alpha_init: 1.0
  min_alpha: null
  max_alpha: null
  fixed_alpha: false
  scale_mapping: biased_softplus_1.0
  use_tanh_normal: true
  coupled_discrete_values: true
task:
  max_steps: 100
  dim_c: 4
model:
  name: mlp
  num_cells:
  - 256
  - 256
  layer_class: torch.nn.Linear
  activation_class: torch.nn.Tanh
  activation_kwargs: null
  norm_class: null
  norm_kwargs: null
  num_feature_dims: 1
critic_model:
  name: mlp
  num_cells:
  - 256
  - 256
  layer_class: torch.nn.Linear
  activation_class: torch.nn.Tanh
  activation_kwargs: null
  norm_class: null
  norm_kwargs: null
  num_feature_dims: 1
seed: 7
nashconv:
  enable: true
  eval_interval: 1
  br_episodes: 1
  eval_episodes: 1
