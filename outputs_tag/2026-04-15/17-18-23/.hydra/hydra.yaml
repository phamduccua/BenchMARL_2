hydra:
  run:
    dir: outputs/${now:%Y-%m-%d}/${now:%H-%M-%S}
  sweep:
    dir: multirun/${now:%Y-%m-%d}/${now:%H-%M-%S}
    subdir: ${hydra.job.num}
  launcher:
    _target_: hydra._internal.core_plugins.basic_launcher.BasicLauncher
  sweeper:
    _target_: hydra._internal.core_plugins.basic_sweeper.BasicSweeper
    max_batch_size: null
    params: null
  help:
    app_name: ${hydra.job.name}
    header: '${hydra.help.app_name} is powered by Hydra.

      '
    footer: 'Powered by Hydra (https://hydra.cc)

      Use --hydra-help to view Hydra specific help

      '
    template: '${hydra.help.header}

      == Configuration groups ==

      Compose your configuration from those groups (group=option)


      $APP_CONFIG_GROUPS


      == Config ==

      Override anything in the config (foo.bar=value)


      $CONFIG


      ${hydra.help.footer}

      '
  hydra_help:
    template: 'Hydra (${hydra.runtime.version})

      See https://hydra.cc for more info.


      == Flags ==

      $FLAGS_HELP


      == Configuration groups ==

      Compose your configuration from those groups (For example, append hydra/job_logging=disabled
      to command line)


      $HYDRA_CONFIG_GROUPS


      Use ''--cfg hydra'' to Show the Hydra config.

      '
    hydra_help: ???
  hydra_logging:
    version: 1
    formatters:
      simple:
        format: '[%(asctime)s][HYDRA] %(message)s'
    handlers:
      console:
        class: logging.StreamHandler
        formatter: simple
        stream: ext://sys.stdout
    root:
      level: INFO
      handlers:
      - console
    loggers:
      logging_example:
        level: DEBUG
    disable_existing_loggers: false
  job_logging:
    version: 1
    formatters:
      simple:
        format: '[%(asctime)s][%(name)s][%(levelname)s] - %(message)s'
    handlers:
      console:
        class: logging.StreamHandler
        formatter: simple
        stream: ext://sys.stdout
      file:
        class: logging.FileHandler
        formatter: simple
        filename: ${hydra.runtime.output_dir}/${hydra.job.name}.log
    root:
      level: INFO
      handlers:
      - console
      - file
    disable_existing_loggers: false
  env: {}
  mode: RUN
  searchpath: []
  callbacks: {}
  output_subdir: .hydra
  overrides:
    hydra:
    - hydra.mode=RUN
    task:
    - algorithm=ippo_vi
    - task=vmas/simple_tag
    - seed=5
    - algorithm.vi_tau=0.05
    - experiment.loggers=[csv]
    - experiment.render=false
    - experiment.max_n_frames=2_000_000
    - experiment.sampling_device=cuda
    - experiment.train_device=cuda
    - experiment.buffer_device=cuda
    - experiment.on_policy_n_envs_per_worker=200
    - experiment.on_policy_collected_frames_per_batch=120000
    - experiment.on_policy_minibatch_size=4096
    - experiment.on_policy_n_minibatch_iters=15
    - experiment.evaluation_interval=240000
    - +nashconv.enable=true
    - +nashconv.eval_interval=1
    - +nashconv.br_episodes=1
    - +nashconv.eval_episodes=1
  job:
    name: run
    chdir: null
    override_dirname: +nashconv.br_episodes=1,+nashconv.enable=true,+nashconv.eval_episodes=1,+nashconv.eval_interval=1,algorithm.vi_tau=0.05,algorithm=ippo_vi,experiment.buffer_device=cuda,experiment.evaluation_interval=240000,experiment.loggers=[csv],experiment.max_n_frames=2_000_000,experiment.on_policy_collected_frames_per_batch=120000,experiment.on_policy_minibatch_size=4096,experiment.on_policy_n_envs_per_worker=200,experiment.on_policy_n_minibatch_iters=15,experiment.render=false,experiment.sampling_device=cuda,experiment.train_device=cuda,seed=5,task=vmas/simple_tag
    id: ???
    num: ???
    config_name: config
    env_set: {}
    env_copy: []
    config:
      override_dirname:
        kv_sep: '='
        item_sep: ','
        exclude_keys: []
  runtime:
    version: 1.3.2
    version_base: '1.3'
    cwd: /home/user/BenchMARL
    config_sources:
    - path: hydra.conf
      schema: pkg
      provider: hydra
    - path: /home/user/BenchMARL/benchmarl/conf
      schema: file
      provider: main
    - path: ''
      schema: structured
      provider: schema
    output_dir: /home/user/BenchMARL/outputs/2026-04-15/17-18-23
    choices:
      model@critic_model: layers/mlp
      model: layers/mlp
      task: vmas/simple_tag
      algorithm: ippo_vi
      experiment: base_experiment
      hydra/env: default
      hydra/callbacks: null
      hydra/job_logging: default
      hydra/hydra_logging: default
      hydra/hydra_help: default
      hydra/help: default
      hydra/sweeper: basic
      hydra/launcher: basic
      hydra/output: default
  verbose: false
